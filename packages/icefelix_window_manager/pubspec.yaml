name: icefelix_window_manager
description: >-
  Window management for Flutter desktop apps. Size, position, state,
  multi-monitor, frameless, events. macOS today; Windows + Linux next.
version: 0.1.0
repository: https://github.com/ICE-Felix/icefelix-window-manager
issue_tracker: https://github.com/ICE-Felix/icefelix-window-manager/issues
homepage: https://icefelix.com/packages/window-manager
documentation: https://pub.dev/documentation/icefelix_window_manager/latest/

topics: [window, desktop, multi-monitor, ui, platform-integration]

funding:
  - https://icefelix.com/sponsor
  - https://github.com/sponsors/alexbordei

platforms:
  macos:

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  icefelix_window_manager_platform_interface: ^0.1.0
  meta: ^1.15.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
