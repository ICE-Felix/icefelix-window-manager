name: icefelix_window_manager
description: >-
  Cross-platform window management for Flutter desktop. Size, position,
  state, multi-monitor, frameless, events. macOS + Windows in one package.
version: 0.4.1
repository: https://github.com/ICE-Felix/icefelix-window-manager
issue_tracker: https://github.com/ICE-Felix/icefelix-window-manager/issues
homepage: https://icefelix.com/packages/window-manager
documentation: https://pub.dev/documentation/icefelix_window_manager/latest/

topics: [window, desktop, multi-monitor, ui, platform-integration]

funding:
  - https://icefelix.com/sponsor
  - https://github.com/sponsors/alexbordei

screenshots:
  - description: >-
      Ten differently-shaped Flutter Windows apps running side by side, each
      a true non-rectangular window via setShape(). See
      example/polygon_demo for the source.
    path: screenshots/polygon_promo.png

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  pigeon: ^22.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: IcefelixWindowManagerPlugin
      windows:
        pluginClass: IcefelixWindowManagerPluginCApi
      linux:
        pluginClass: IcefelixWindowManagerPlugin
