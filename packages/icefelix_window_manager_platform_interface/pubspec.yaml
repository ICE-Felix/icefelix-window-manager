name: icefelix_window_manager_platform_interface
description: >-
  Platform interface for icefelix_window_manager. Defines the abstract API and
  Pigeon-generated bindings. Used by platform implementations (macOS, Windows, Linux).
version: 0.1.0-dev.1
repository: https://github.com/ICE-Felix/icefelix-window-manager
issue_tracker: https://github.com/ICE-Felix/icefelix-window-manager/issues
homepage: https://icefelix.com/packages/window-manager

topics: [window, desktop, platform-interface]

funding:
  - https://icefelix.com/sponsor

platforms:
  macos:
  windows:
  linux:

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
