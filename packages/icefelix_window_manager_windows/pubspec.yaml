name: icefelix_window_manager_windows
description: >-
  Windows implementation of icefelix_window_manager. Wraps the Win32 window API
  via Pigeon-typed channels. App developers depend on icefelix_window_manager,
  not this package.
version: 0.1.0
repository: https://github.com/ICE-Felix/icefelix-window-manager
issue_tracker: https://github.com/ICE-Felix/icefelix-window-manager/issues
homepage: https://icefelix.com/packages/window-manager

topics: [window, desktop, windows]

funding:
  - https://icefelix.com/sponsor

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  icefelix_window_manager_platform_interface: ^0.1.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: icefelix_window_manager
    platforms:
      windows:
        # C-callable entry point in windows/icefelix_window_manager_windows_plugin_c_api.cpp.
        # Flutter invokes <pluginClass>RegisterWithRegistrar.
        pluginClass: IcefelixWindowManagerWindowsPluginCApi
        # Auto-registered on app startup so consumers don't need to call
        # registerWith() manually (mirrors macOS).
        dartPluginClass: IcefelixWindowManagerWindows
